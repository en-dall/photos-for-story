<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Photo'n'Beat - マルチ分割BPM同期ビューア</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'M PLUS 1p', sans-serif; 
            background: #1a1a1a; 
            color: #e0e0e0; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
        }
        h2 { color: #ffffff; font-weight: 700; margin-bottom: 5px; font-size: 2em; letter-spacing: 0.05em; }
        .subtitle { color: #888; font-size: 0.9em; margin-bottom: 30px; }
        .controls { 
            background: #2a2a2a;
            max-width: 600px;
            margin: 15px auto; 
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .radio-group-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin: 5px 0;
        }
        .radio-label {
            font-size: 0.95em;
            color: #ccc;
        }
        .radio-options {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .radio-options label {
            background: #3a3a3a;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #555;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 50px;
            transition: background 0.2s, border-color 0.2s;
        }
        .radio-options input[type="radio"] {
            margin: 0;
            cursor: pointer;
        }
        .radio-options label:hover {
            background: #4a4a4a;
        }
        
        /* ラジオボタン選択時のスタイル変更 */
        .radio-options label:has(input[type="radio"]:checked) {
            border-color: #007aff;
            background: #2f3e50;
        }
        .radio-options label:has(input[type="radio"]:checked) .note-icon {
            background-color: #007aff;
        }
        .radio-options label:has(input[type="radio"]:checked) .note-head.note-half {
            border-color: #007aff;
        }

        /* --- CSSで作る縮小版音符アイコン（20px四方） --- */
        .note-icon {
            position: relative;
            width: 20px;
            height: 20px;
            background-color: transparent;
        }
        .note-head {
            position: absolute;
            bottom: 1px;
            left: 1px;
            width: 9px;
            height: 7px;
            border-radius: 50%;
            transform: rotate(-25deg);
        }
        .note-black { background-color: #fff; }
        .note-half { 
            background-color: transparent; 
            border: 1.5px solid #fff; 
            box-sizing: border-box;
            width: 10px;
            height: 8px;
        }
        .note-stem {
            position: absolute;
            bottom: 4px;
            left: 8px;
            width: 1.5px;
            height: 14px;
            background-color: #fff;
        }
        .note-flag-8 {
            position: absolute;
            top: 2px;
            left: 9px;
            width: 5px;
            height: 7px;
            border-right: 1.5px solid #fff;
            border-top: 1.5px solid #fff;
            border-radius: 0 4px 3px 0;
            transform: skewX(15deg);
        }
        .note-flag-16-1 {
            position: absolute;
            top: 2px;
            left: 9px;
            width: 5px;
            height: 5px;
            border-right: 1.5px solid #fff;
            border-top: 1.5px solid #fff;
            border-radius: 0 3px 2px 0;
            transform: skewX(15deg);
        }
        .note-flag-16-2 {
            position: absolute;
            top: 6px;
            left: 9px;
            width: 4px;
            height: 4px;
            border-right: 1.5px solid #fff;
            border-top: 1.5px solid #fff;
            border-radius: 0 3px 2px 0;
            transform: skewX(15deg);
        }

        /* 分割数選択用スイッチのスタイル */
        .split-options {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .split-options label {
            background: #3a3a3a;
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid #555;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .split-options input[type="radio"] {
            display: none; 
        }
        .split-options label:has(input[type="radio"]:checked) {
            background: #007aff;
            border-color: #007aff;
            color: #fff;
        }

        .button-group {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 5px;
        }
        input[type="file"] { font-family: 'M PLUS 1p', sans-serif; }
        input[type="number"], input[type="color"] { 
            padding: 6px 10px; 
            background: #3a3a3a; 
            color: #fff; 
            border: 1px solid #555; 
            border-radius: 4px;
            font-family: 'M PLUS 1p', sans-serif;
        }
        input[type="number"] { width: 70px; }
        input[type="color"] { padding: 2px; width: 50px; height: 32px; cursor: pointer; }
        button { 
            padding: 10px 24px; 
            cursor: pointer; 
            background: #007aff; 
            color: #fff; 
            border: none; 
            border-radius: 6px;
            font-weight: 700;
            font-size: 1em;
            font-family: 'M PLUS 1p', sans-serif;
            transition: background 0.2s;
        }
        button:hover { background: #0063cc; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        #canvas-container { margin: 30px auto; max-width: 360px; } 
        canvas { background: #000; width: 100%; height: auto; border-radius: 8px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); }
        .info { font-size: 0.9em; color: #aaa; width: 100%; text-align: center; margin-top: 5px; line-height: 1.6; }
        .status-match { color: #34c759; font-weight: bold; }
        .status-loop { color: #ff9500; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Photo'n'Beat</h2>
    <div class="subtitle">BPM Audio-Visual Sync Exporter</div>
    
    <div class="controls">
        <input type="file" id="file-input" multiple accept="image/*">
    </div>
    
    <div class="controls">
        <div class="radio-group-container" style="margin-bottom: 10px;">
            <div class="radio-label">画面分割数</div>
            <div class="split-options">
                <label><input type="radio" name="split-radio" value="2">2分割</label>
                <label><input type="radio" name="split-radio" value="3" checked>3分割</label>
                <label><input type="radio" name="split-radio" value="4">4分割</label>
            </div>
        </div>

        <div class="control-group">
            <label>BPM</label>
            <input type="number" id="bpm-input" value="120" min="20" max="300">
        </div>
        <div class="control-group">
            <label>総再生時間(秒)</label>
            <input type="number" id="duration-input" value="10" min="1" max="180">
        </div>
        <div class="control-group">
            <label>背景色</label>
            <input type="color" id="bg-color" value="#000000">
        </div>

        <div class="radio-group-container">
            <div class="radio-label">タイミング</div>
            <div class="radio-options">
                <label>
                    <input type="radio" name="note-radio" value="0.5">
                    <div class="note-icon">
                        <div class="note-head note-half"></div>
                        <div class="note-stem"></div>
                    </div>
                </label>
                <label>
                    <input type="radio" name="note-radio" value="1">
                    <div class="note-icon">
                        <div class="note-head note-black"></div>
                        <div class="note-stem"></div>
                    </div>
                </label>
                <label>
                    <input type="radio" name="note-radio" value="2" checked>
                    <div class="note-icon">
                        <div class="note-head note-black"></div>
                        <div class="note-stem"></div>
                        <div class="note-flag-8"></div>
                    </div>
                </label>
                <label>
                    <input type="radio" name="note-radio" value="4">
                    <div class="note-icon">
                        <div class="note-head note-black"></div>
                        <div class="note-stem"></div>
                        <div class="note-flag-16-1"></div>
                        <div class="note-flag-16-2"></div>
                    </div>
                </label>
            </div>
        </div>
        
        <div class="button-group">
            <button id="start-btn" disabled>動画生成（自動保存）</button>
        </div>
        
        <div class="info" id="fps-info">
            算出FPS: -- / 総フレーム数: --<br>
            被りなしに必要な画像数: -- 枚 (現在の選択: 0枚)
        </div>
        <div style="font-size: 0.75em; color: #666; margin-top: 40px; text-align: center; line-height: 1.5;">
            本アプリで読み込んだ画像データはすべてブラウザ内で処理され、外部サーバーへ送信・保存されることは一切ありません。
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="viewer-canvas" width="1080" height="1920"></canvas>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const startBtn = document.getElementById('start-btn');
        const canvas = document.getElementById('viewer-canvas');
        const ctx = canvas.getContext('2d');
        const bpmInput = document.getElementById('bpm-input');
        const durationInput = document.getElementById('duration-input');
        const bgColorInput = document.getElementById('bg-color');
        const fpsInfo = document.getElementById('fps-info');

        let images = [];
        let animationId = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        
        let currentIndex = 0;
        let sequenceStep = 0;
        let paneIndices = [0, 0, 0, 0];
        
        let totalFrames = 0;
        let currentFrameCount = 0;

        function getSelectedNoteModifier() {
            const checkedRadio = document.querySelector('input[name="note-radio"]:checked');
            return checkedRadio ? parseFloat(checkedRadio.value) : 2;
        }

        function getSelectedSplitCount() {
            const checkedRadio = document.querySelector('input[name="split-radio"]:checked');
            return checkedRadio ? parseInt(checkedRadio.value) : 3;
        }

        // 入力フォームの値が不正、あるいは上下限を超えているかをチェックしてクレンジングする共通関数
        function validateInputs() {
            let bpm = parseFloat(bpmInput.value);
            if (isNaN(bpm) || bpm < 20) { bpm = 20; bpmInput.value = 20; }
            if (bpm > 300) { bpm = 300; bpmInput.value = 300; }

            let duration = parseFloat(durationInput.value);
            if (isNaN(duration) || duration < 1) { duration = 1; durationInput.value = 1; }
            if (duration > 180) { duration = 180; durationInput.value = 180; }
        }

        // リアルタイム計算関数（文字入力の邪魔をしないよう、範囲外でもエラーにせずそのまま計算する）
        function updateRequirements() {
            let bpm = parseFloat(bpmInput.value) || 120;
            let duration = parseFloat(durationInput.value) || 10;
            const noteModifier = getSelectedNoteModifier();
            const splitCount = getSelectedSplitCount();
            
            const fps = (bpm / 60) * noteModifier;
            totalFrames = Math.ceil(fps * duration);
            
            const requiredImages = totalFrames + (splitCount - 1);
            
            let statusText = "";
            if (images.length > 0) {
                if (images.length < splitCount) {
                    statusText = ` <span class="status-loop" style="color:#ff3b30;">(最低${splitCount}枚必要です)</span>`;
                    startBtn.disabled = true;
                } else if (images.length >= requiredImages) {
                    statusText = ` <span class="status-match">(足りています：画像は余ります)</span>`;
                    startBtn.disabled = false;
                } else {
                    statusText = ` <span class="status-loop">(不足分は頭からループ再生されます)</span>`;
                    startBtn.disabled = false;
                }
            }

            fpsInfo.innerHTML = `
                算出FPS: ${fps.toFixed(2)} / 総フレーム数: ${totalFrames}<br>
                被りなしに必要な画像数: <strong>${requiredImages}</strong> 枚 (現在の選択: ${images.length}枚)${statusText}
            `;
        }

        // 入力中（タイピング中）はリアルタイムに枚数計算だけ動かす（強制書き換えはしない）
        [bpmInput, durationInput].forEach(element => {
            element.addEventListener('input', updateRequirements);
            // 入力欄からフォーカスが外れた（確定した）タイミングで上下限補正を実行
            element.addEventListener('blur', () => {
                validateInputs();
                updateRequirements();
            });
        });
        
        document.querySelectorAll('input[name="note-radio"]').forEach(radio => {
            radio.addEventListener('change', updateRequirements);
        });

        document.querySelectorAll('input[name="split-radio"]').forEach(radio => {
            radio.addEventListener('change', updateRequirements);
        });

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            const splitCount = getSelectedSplitCount();
            if (files.length < splitCount) {
                alert(`選択した分割数のため、画像は${splitCount}枚以上必要です。`);
                return;
            }

            files.sort((a, b) => a.lastModified - b.lastModified);

            images = [];
            let loadedCount = 0;

            files.forEach((file) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    images.push(img);
                    loadedCount++;
                    if (loadedCount === files.length) {
                        updateRequirements();
                        alert(`${images.length}枚の画像を読み込みました。準備完了です。`);
                    }
                };
            });
        });

        function drawFrame() {
            const splitCount = getSelectedSplitCount();
            const paneH = canvas.height / splitCount;
            const paneW = canvas.width;
            const bgColor = bgColorInput.value;

            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            function drawImageWithMargin(img, offsetY) {
                const padding = 20; 
                const maxW = paneW - (padding * 2);
                const maxH = paneH - (padding * 2);

                const imgRatio = img.width / img.height;
                const targetRatio = maxW / maxH;
                
                let drawW, drawH, drawX, drawY;

                if (imgRatio > targetRatio) {
                    drawW = maxW;
                    drawH = maxW / imgRatio;
                    drawX = padding;
                    drawY = offsetY + padding + (maxH - drawH) / 2;
                } else {
                    drawH = maxH;
                    drawW = maxH * imgRatio;
                    drawX = padding + (maxW - drawW) / 2;
                    drawY = offsetY + padding;
                }
                ctx.drawImage(img, drawX, drawY, drawW, drawH);
            }

            if (sequenceStep < splitCount) {
                paneIndices[sequenceStep] = currentIndex;
                currentIndex++;
                
                for (let i = 0; i <= sequenceStep; i++) {
                    drawImageWithMargin(images[paneIndices[i] % images.length], paneH * i);
                }
            } 
            else {
                const loopPos = (sequenceStep - splitCount) % splitCount;
                paneIndices[loopPos] = currentIndex;
                currentIndex++;

                for (let i = 0; i < splitCount; i++) {
                    drawImageWithMargin(images[paneIndices[i] % images.length], paneH * i);
                }
            }

            sequenceStep++;
            currentFrameCount++;
        }

        startBtn.addEventListener('click', () => {
            // ボタンが押されたら、未確定の数値も含めて確実に制限内に補正
            validateInputs();
            updateRequirements();

            currentIndex = 0;
            sequenceStep = 0;
            paneIndices = [0, 0, 0, 0];
            currentFrameCount = 0;
            recordedChunks = [];

            const bpm = parseFloat(bpmInput.value);
            const noteModifier = getSelectedNoteModifier();
            const fps = (bpm / 60) * noteModifier;

            const stream = canvas.captureStream(fps);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
            
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `PhotonBeat_${getSelectedSplitCount()}Split_${bpm}bpm.webm`;
                a.click();
                startBtn.disabled = false;
            };

            mediaRecorder.start();
            startBtn.disabled = true;
            
            const interval = 1000 / fps;
            let lastTime = 0;
            
            function loop(timestamp) {
                if (!lastTime) lastTime = timestamp;
                const elapsed = timestamp - lastTime;

                if (elapsed >= interval) {
                    drawFrame();
                    lastTime = timestamp;
                }

                if (currentFrameCount >= totalFrames) {
                    cancelAnimationFrame(animationId);
                    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                        mediaRecorder.stop();
                    }
                    return;
                }
                
                animationId = requestAnimationFrame(loop);
            }
            
            animationId = requestAnimationFrame(loop);
        });

        updateRequirements();
    </script>
</body>
</html>

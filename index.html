<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>LoopThree</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'M PLUS 1p', sans-serif; 
            background: #1a1a1a; 
            color: #e0e0e0; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
        }
        h2 { color: #ffffff; font-weight: 700; margin-bottom: 5px; }
        .subtitle { color: #888; font-size: 0.9em; margin-bottom: 30px; }
        .controls { 
            background: #2a2a2a;
            max-width: 600px;
            margin: 15px auto; 
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .button-group {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 5px;
        }
        input[type="file"] { font-family: 'M PLUS 1p', sans-serif; }
        input[type="number"], select, input[type="color"] { 
            padding: 6px 10px; 
            background: #3a3a3a; 
            color: #fff; 
            border: 1px solid #555; 
            border-radius: 4px;
            font-family: 'M PLUS 1p', sans-serif;
        }
        input[type="number"] { width: 70px; }
        input[type="color"] { padding: 2px; width: 50px; height: 32px; cursor: pointer; }
        button { 
            padding: 10px 24px; 
            cursor: pointer; 
            background: #007aff; 
            color: #fff; 
            border: none; 
            border-radius: 6px;
            font-weight: 700;
            font-size: 1em;
            font-family: 'M PLUS 1p', sans-serif;
            transition: background 0.2s;
        }
        button:hover { background: #0063cc; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        #canvas-container { margin: 30px auto; max-width: 600px; }
        canvas { background: #000; width: 100%; height: auto; border-radius: 4px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); }
        .info { font-size: 0.9em; color: #aaa; width: 100%; text-align: center; margin-top: 5px; line-height: 1.6; }
        .status-match { color: #34c759; font-weight: bold; }
        .status-loop { color: #ff9500; font-weight: bold; }
    </style>
</head>
<body>

    <h2>LoopThree</h2>
    <div class="subtitle">3分割BPM同期ビューア & エクスポーター</div>
    
    <div class="controls">
        <input type="file" id="file-input" multiple accept="image/*">
    </div>
    
    <div class="controls">
        <div class="control-group">
            <label>BPM</label>
            <input type="number" id="bpm-input" value="120" min="20" max="300">
        </div>
        <div class="control-group">
            <label>タイミング</label>
            <select id="note-input">
                <option value="1">4分音符 (1拍ごと)</option>
                <option value="2" selected>8分音符 (0.5拍ごと)</option>
                <option value="4">16分音符 (0.25拍ごと)</option>
                <option value="0.5">2分音符 (2拍ごと)</option>
            </select>
        </div>
        <div class="control-group">
            <label>総再生時間(秒)</label>
            <input type="number" id="duration-input" value="10" min="1" max="300">
        </div>
        <div class="control-group">
            <label>背景色</label>
            <input type="color" id="bg-color" value="#000000">
        </div>
        
        <div class="button-group">
            <button id="start-btn" disabled>動画生成（自動保存）</button>
        </div>
        
        <div class="info" id="fps-info">
            算出FPS: -- / 総フレーム数: --<br>
            被りなしに必要な画像数: -- 枚 (現在の選択: 0枚)
        </div>
    </div>

   <div id="canvas-container">
        <canvas id="viewer-canvas" width="1080" height="1920"></canvas>
    </div>
    
    <script>
        const fileInput = document.getElementById('file-input');
        const startBtn = document.getElementById('start-btn');
        const canvas = document.getElementById('viewer-canvas');
        const ctx = canvas.getContext('2d');
        const bpmInput = document.getElementById('bpm-input');
        const noteInput = document.getElementById('note-input');
        const durationInput = document.getElementById('duration-input');
        const bgColorInput = document.getElementById('bg-color');
        const fpsInfo = document.getElementById('fps-info');

        let images = [];
        let animationId = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        
        let currentIndex = 0;
        let sequenceStep = 0;
        let indexTop = 0;
        let indexMid = 0;
        let indexBot = 0;
        
        let totalFrames = 0;
        let currentFrameCount = 0;

        function updateRequirements() {
            const bpm = parseFloat(bpmInput.value) || 120;
            const noteModifier = parseFloat(noteInput.value);
            const duration = parseFloat(durationInput.value) || 10;
            
            const fps = (bpm / 60) * noteModifier;
            totalFrames = Math.ceil(fps * duration);
            
            const requiredImages = totalFrames + 2;
            
            let statusText = "";
            if (images.length > 0) {
                if (images.length >= requiredImages) {
                    statusText = ` <span class="status-match">(足りています：画像は余ります)</span>`;
                } else {
                    statusText = ` <span class="status-loop">(不足分は頭からループ再生されます)</span>`;
                }
            }

            fpsInfo.innerHTML = `
                算出FPS: ${fps.toFixed(2)} / 総フレーム数: ${totalFrames}<br>
                被りなしに必要な画像数: <strong>${requiredImages}</strong> 枚 (現在の選択: ${images.length}枚)${statusText}
            `;
        }

        [bpmInput, noteInput, durationInput].forEach(element => {
            element.addEventListener('input', updateRequirements);
        });

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (files.length < 3) {
                alert('画像は3枚以上選択してください。');
                return;
            }

            files.sort((a, b) => a.lastModified - b.lastModified);

            images = [];
            let loadedCount = 0;

            files.forEach((file) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    images.push(img);
                    loadedCount++;
                    if (loadedCount === files.length) {
                        startBtn.disabled = false;
                        updateRequirements();
                        alert(`${images.length}枚の画像を読み込みました。準備完了です。`);
                    }
                };
            });
        });

        function drawFrame() {
            const paneH = canvas.height / 3;
            const paneW = canvas.width;
            const bgColor = bgColorInput.value;

            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            function drawImageContain(img, offsetY) {
                const imgRatio = img.width / img.height;
                const paneRatio = paneW / paneH;
                let drawW, drawH, drawX, drawY;

                if (imgRatio > paneRatio) {
                    drawW = paneW;
                    drawH = paneW / imgRatio;
                    drawX = 0;
                    drawY = offsetY + (paneH - drawH) / 2;
                } else {
                    drawH = paneH;
                    drawW = paneH * imgRatio;
                    drawX = (paneW - drawW) / 2;
                    drawY = offsetY;
                }
                ctx.drawImage(img, drawX, drawY, drawW, drawH);
            }

            if (sequenceStep === 0) {
                indexTop = 0;
                drawImageContain(images[indexTop % images.length], 0);
                currentIndex = 1;
            } 
            else if (sequenceStep === 1) {
                indexMid = currentIndex;
                drawImageContain(images[indexTop % images.length], 0);
                drawImageContain(images[indexMid % images.length], paneH);
                currentIndex++;
            } 
            else if (sequenceStep === 2) {
                indexBot = currentIndex;
                drawImageContain(images[indexTop % images.length], 0);
                drawImageContain(images[indexMid % images.length], paneH);
                drawImageContain(images[indexBot % images.length], paneH * 2);
                currentIndex++;
            } 
            else {
                const loopPos = (sequenceStep - 3) % 3;
                if (loopPos === 0) {
                    indexTop = currentIndex;
                    currentIndex++;
                } else if (loopPos === 1) {
                    indexMid = currentIndex;
                    currentIndex++;
                } else if (loopPos === 2) {
                    indexBot = currentIndex;
                    currentIndex++;
                }

                drawImageContain(images[indexTop % images.length], 0);
                drawImageContain(images[indexMid % images.length], paneH);
                drawImageContain(images[indexBot % images.length], paneH * 2);
            }

            sequenceStep++;
            currentFrameCount++;
        }

        startBtn.addEventListener('click', () => {
            updateRequirements();

            currentIndex = 0;
            sequenceStep = 0;
            indexTop = 0; 
            indexMid = 0; 
            indexBot = 0;
            currentFrameCount = 0;
            recordedChunks = [];

            const bpm = parseFloat(bpmInput.value);
            const noteModifier = parseFloat(noteInput.value);
            const fps = (bpm / 60) * noteModifier;

            const stream = canvas.captureStream(fps);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
            
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `LoopThree_${bpm}bpm.webm`;
                a.click();
                startBtn.disabled = false;
            };

            mediaRecorder.start();
            startBtn.disabled = true;
            
            const interval = 1000 / fps;
            let lastTime = 0;
            
            function loop(timestamp) {
                if (!lastTime) lastTime = timestamp;
                const elapsed = timestamp - lastTime;

                if (elapsed >= interval) {
                    drawFrame();
                    lastTime = timestamp;
                }

                if (currentFrameCount >= totalFrames) {
                    cancelAnimationFrame(animationId);
                    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                        mediaRecorder.stop();
                    }
                    return;
                }
                
                animationId = requestAnimationFrame(loop);
            }
            
            animationId = requestAnimationFrame(loop);
        });

        updateRequirements();
    </script>
</body>
</html>

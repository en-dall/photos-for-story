<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>LoopThree - 3分割BPM同期ビューア</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'M PLUS 1p', sans-serif; 
            background: #1a1a1a; 
            color: #e0e0e0; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
        }
        h2 { color: #ffffff; font-weight: 700; margin-bottom: 5px; }
        .subtitle { color: #888; font-size: 0.9em; margin-bottom: 30px; }
        .controls { 
            background: #2a2a2a;
            max-width: 600px;
            margin: 15px auto; 
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .button-group {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 5px;
        }
        input[type="file"] { font-family: 'M PLUS 1p', sans-serif; }
        input[type="number"], select, input[type="color"] { 
            padding: 6px 10px; 
            background: #3a3a3a; 
            color: #fff; 
            border: 1px solid #555; 
            border-radius: 4px;
            font-family: 'M PLUS 1p', sans-serif;
        }
        input[type="number"] { width: 70px; }
        input[type="color"] { padding: 2px; width: 50px; height: 32px; cursor: pointer; }
        button { 
            padding: 10px 24px; 
            cursor: pointer; 
            background: #007aff; 
            color: #fff; 
            border: none; 
            border-radius: 6px;
            font-weight: 700;
            font-size: 1em;
            font-family: 'M PLUS 1p', sans-serif;
            transition: background 0.2s;
        }
        button:hover { background: #0063cc; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        #canvas-container { margin: 30px auto; max-width: 600px; }
        canvas { background: #000; width: 100%; height: auto; border-radius: 4px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); }
        .info { font-size: 0.9em; color: #aaa; width: 100%; text-align: center; margin-top: 5px; line-height: 1.6; }
        .status-match { color: #34c759; font-weight: bold; }
        .status-loop { color: #ff9500; font-weight: bold; }
    </style>
</head>
<body>

    <h2>LoopThree</h2>
    <div class="subtitle">3分割BPM同期ビューア & エクスポーター</div>
    
    <div class="controls">
        <input type="file" id="file-input" multiple accept="image/*">
    </div>
    
    <div class="controls">
        <div class="control-group">
            <label>BPM</label>
            <input type="number" id="bpm-input" value="120" min="20" max="300">
        </div>
        <div class="control-group">
            <label>タイミング</label>
            <select id="note-input">
                <option value="1">4分音符 (1拍ごと)</option>
                <option value="2" selected>8分音符 (0.5拍ごと)</option>
                <option value="4">16分音符 (0.25拍ごと)</option>
                <option value="0.5">2分音符 (2拍ごと)</option>
            </select>
        </div>
        <div class="control

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Photo'n'Beat - マルチ分割BPM同期ビューア</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;700&family=Noto+Music&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'M PLUS 1p', sans-serif; 
            background: #1a1a1a; 
            color: #e0e0e0; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
        }
        h2 { color: #ffffff; font-weight: 700; margin-bottom: 5px; font-size: 2em; letter-spacing: 0.05em; }
        .subtitle { color: #888; font-size: 0.9em; margin-bottom: 30px; }
        .controls { 
            background: #2a2a2a;
            max-width: 600px;
            margin: 15px auto; 
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .radio-group-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin: 5px 0;
        }
        .radio-label {
            font-size: 0.95em;
            color: #ccc;
        }
        .radio-options {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .radio-options label {
            background: #3a3a3a;
            padding: 4px 14px;
            border-radius: 6px;
            border: 1px solid #555;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 45px;
            height: 38px;
            transition: background 0.2s, border-color 0.2s;
            box-sizing: border-box;
        }
        .radio-options input[type="radio"] {
            margin: 0;
            cursor: pointer;
        }
        .radio-options label:hover {
            background: #4a4a4a;
        }
        
        /* ラジオボタン選択時のスタイル変更 */
        .radio-options label:has(input[type="radio"]:checked) {
            border-color: #007aff;
            background: #2f3e50;
        }
        
        /* --- Noto Music 専用の文字スタイル --- */
        .music-note {
            font-family: 'Noto Music', sans-serif;
            font-size: 24px; 
            color: #fff;
            line-height: 1;
            user-select: none;
        }
        
        .radio-options label:has(input[type="radio"]:checked) .music-note {
            color: #007aff;
        }

        /* 分割数選択用スイッチのスタイル */
        .split-options {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .split-options label {
            background: #3a3a3a;
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid #555;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .split-options input[type="radio"] {
            display: none; 
        }
        .split-options label:has(input[type="radio"]:checked) {
            background: #007aff;
            border-color: #007aff;
            color: #fff;
        }

        .button-group {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 5px;
            gap: 10px;
        }
        input[type="file"] { font-family: 'M PLUS 1p', sans-serif; }
        input[type="number"], input[type="color"] { 
            padding: 6px 10px; 
            background: #3a3a3a; 
            color: #fff; 
            border: 1px solid #555; 
            border-radius: 4px;
            font-family: 'M PLUS 1p', sans-serif;
        }
        input[type="number"] { width: 70px; }
        input[type="color"] { padding: 2px; width: 50px; height: 32px; cursor: pointer; }
        button { 
            padding: 10px 24px; 
            cursor: pointer; 
            background: #007aff; 
            color: #fff; 
            border: none; 
            border-radius: 6px;
            font-weight: 700;
            font-size: 1em;
            font-family: 'M PLUS 1p', sans-serif;
            transition: background 0.2s;
        }
        button:hover { background: #0063cc; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        
        .clear-btn {
            background: #3a3a3a;
            border: 1px solid #555;
        }
        .clear-btn:hover {
            background: #ff3b30;
            border-color: #ff3b30;
        }

        #canvas-container { margin: 30px auto; max-width: 360px; } 
        canvas { background: #000; width: 100%; height: auto; border-radius: 8px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); }
        .info { font-size: 0.9em; color: #aaa; width: 100%; text-align: center; margin-top: 5px; line-height: 1.6; }
        .status-match { color: #34c759; font-weight: bold; }
        .status-loop { color: #ff9500; font-weight: bold; }
        
        .privacy-policy {
            font-size: 0.75em; 
            color: #666; 
            margin-top: 50px; 
            text-align: center; 
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <h2>Photo'n'Beat</h2>
    <div class="subtitle">BPM Audio-Visual Sync Exporter</div>
    
    <div class="controls">
        <input type="file" id="file-input" multiple accept="image/*">
    </div>
    
    <div class="controls">
        <div class="radio-group-container" style="margin-bottom: 10px;">
            <div class="radio-label">画面分割数</div>
            <div class="split-options">
                <label><input type="radio" name="split-radio" value="2">2分割</label>
                <label><input type="radio" name="split-radio" value="3" checked>3分割</label>
                <label><input type="radio" name="split-radio" value="4">4分割</label>
            </div>
        </div>

        <div class="control-group">
            <label>BPM</label>
            <input type="number" id="bpm-input" value="120" min="20" max="300">
        </div>
        <div class="control-group">
            <label>総再生時間(秒)</label>
            <input type="number" id="duration-input" value="10" min="1" max="180">
        </div>
        <div class="control-group">
            <label>背景色</label>
            <input type="color" id="bg-color" value="#000000">
        </div>

        <div class="radio-group-container">
            <div class="radio-label">タイミング</div>
            <div class="radio-options">
                <label>
                    <input type="radio" name="note-radio" value="0.5">
                    <span class="music-note">&#x1D15E;</span>
                </label>
                <label>
                    <input type="radio" name="note-radio" value="1">
                    <span class="music-note">&#x1D15F;</span>
                </label>
                <label>
                    <input type="radio" name="note-radio" value="2" checked>
                    <span class="music-note">&#x1D160;</span>
                </label>
                <label>
                    <input type="radio" name="note-radio" value="4">
                    <span class="music-note">&#x1D161;</span>
                </label>
            </div>
        </div>
        
        <div class="button-group">
            <button id="start-btn" disabled>動画生成（自動保存）</button>
            <button id="clear-btn" class="clear-btn" type="button">選択解除</button>
        </div>
        
        <div class="info" id="fps-info">
            算出FPS: -- / 総フレーム数: --<br>
            被りなしに必要な画像数: -- 枚 (現在の選択: 0枚)
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="viewer-canvas" width="1080" height="1920"></canvas>
    </div>

    <div class="privacy-policy">
        【プライバシーポリシー】<br>
        本アプリで読み込んだ画像データはすべてブラウザ内で処理され、外部サーバーへ送信・保存されることは一切ありません。
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const startBtn = document.getElementById('start-btn');
        const clearBtn = document.getElementById('clear-btn');
        const canvas = document.getElementById('viewer-canvas');
        const ctx = canvas.getContext('2d');
        const bpmInput = document.getElementById('bpm-input');
        const durationInput = document.getElementById('duration-input');
        const bgColorInput = document.getElementById('bg-color');
        const fpsInfo = document.getElementById('fps-info');

        let images = [];
        let animationId = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        
        let currentIndex = 0;
        let sequenceStep = 0;
        let paneIndices = [0, 0, 0, 0];
        
        let totalFrames = 0;
        let currentFrameCount = 0;

        function getSelectedNoteModifier() {
            const checkedRadio = document.querySelector('input[name="note-radio"]:checked');
            return checkedRadio ? parseFloat(checkedRadio.value) : 2;
        }

        function getSelectedSplitCount() {
            const checkedRadio = document.querySelector('input[name="split-radio"]:checked');
            return checkedRadio ? parseInt(checkedRadio.value) : 3;
        }

        function validateInputs() {
            let bpm = parseFloat(bpmInput.value);
            if (isNaN(bpm) || bpm < 20) { bpm = 20; bpmInput.value = 20; }
            if (bpm > 300) { bpm = 300; bpmInput.value = 300; }

            let duration = parseFloat(durationInput.value);
            if (isNaN(duration) || duration < 1) { duration = 1; durationInput.value = 1; }
            if (duration > 180) { duration = 180; durationInput.value = 180; }
        }

        function updateRequirements() {
            let bpm = parseFloat(bpmInput.value) || 120;
            let duration = parseFloat(durationInput.value) || 10;
            const noteModifier = getSelectedNoteModifier();
            const splitCount = getSelectedSplitCount();
            
            const fps = (bpm / 60) * noteModifier;
            totalFrames = Math.ceil(fps * duration);
            
            const requiredImages = totalFrames + (splitCount - 1);
            
            let statusText = "";
            if (images.length > 0) {
                if (images.length < splitCount) {
                    statusText = ` <span class="status-loop" style="color:#ff3b30;">(最低${splitCount}枚必要です)</span>`;
                    startBtn.disabled = true;
                } else if (images.length >= requiredImages) {
                    statusText = ` <span class="status-match">(足りています：画像は余ります)</span>`;
                    startBtn.disabled = false;
                } else {
                    statusText = ` <span class="status-loop">(不足分は頭からループ再生されます)</span>`;
                    startBtn.disabled = false;
                }
            } else {
                startBtn.disabled = true;
            }

            fpsInfo.innerHTML = `
                算出FPS: ${fps.toFixed(2)} / 総フレーム数: ${totalFrames}<br>
                被りなしに必要な画像数: <strong>${requiredImages}</strong> 枚 (現在の選択: ${images.length}枚)${statusText}
            `;
        }

        [bpmInput, durationInput].forEach(element => {
            element.addEventListener('input', updateRequirements);
            element.addEventListener('blur', () => {
                validateInputs();
                updateRequirements();
            });
        });
        
        document.querySelectorAll('input[name="note-radio"]').forEach(radio => {
            radio.addEventListener('change', updateRequirements);
        });

        document.querySelectorAll('input[name="split-radio"]').forEach(radio => {
            radio.addEventListener('change', updateRequirements);
        });

        clearBtn.addEventListener('click', () => {
            images = [];
            fileInput.value = ""; 
            updateRequirements();
            alert('選択されていた画像をすべてクリアしました。');
        });

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            let loadedCount = 0;
            let skippedCount = 0;
            const splitCount = getSelectedSplitCount();

            files.forEach((file) => {
                const isDuplicate = images.some(existingImg => 
                    existingImg._meta &&
                    existingImg._meta.name === file.name &&
                    existingImg._meta.size === file.size &&
                    existingImg._meta.lastModified === file.lastModified
                );

                if (isDuplicate) {
                    skippedCount++;
                    loadedCount++;
                    if (loadedCount === files.length) {
                        finalizeImageLoading(skippedCount);
                    }
                    return;
                }

                const srcImg = new Image();
                srcImg.src = URL.createObjectURL(file);
                
                srcImg.onload = () => {
                    if (srcImg.width >= srcImg.height) {
                        srcImg._meta = {
                            name: file.name,
                            size: file.size,
                            lastModified: file.lastModified * 10 // ソート用の桁調整
                        };
                        images.push(srcImg);
                    } else {
                        const sliceH = srcImg.height / splitCount;
                        
                        for (let i = 0; i < splitCount; i++) {
                            const sliceCanvas = document.createElement('canvas');
                            sliceCanvas.width = srcImg.width;
                            sliceCanvas.height = sliceH;
                            const sliceCtx = sliceCanvas.getContext('2d');
                            
                            sliceCtx.drawImage(srcImg, 0, sliceH * i, srcImg.width, sliceH, 0, 0, srcImg.width, sliceH);
                            
                            const slicedImg = new Image();
                            slicedImg.src = sliceCanvas.toDataURL('image/jpeg', 0.9);
                            
                            // ★ タイムスタンプに「i」を加算し、確実に「上(0) → 中(1) → 下(2)」の順に並ぶようロック ★
                            slicedImg._meta = {
                                name: `${file.name}_part${i}`,
                                size: file.size,
                                lastModified: (file.lastModified * 10) + i
                            };
                            
                            images.push(slicedImg);
                        }
                    }

                    loadedCount++;
                    if (loadedCount === files.length) {
                        setTimeout(() => {
                            finalizeImageLoading(skippedCount);
                        }, 200);
                    }
                };
            });
        });

        function finalizeImageLoading(skippedCount) {
            images.sort((a, b) => a._meta.lastModified - b._meta.lastModified);
            updateRequirements();
            fileInput.value = ""; 

            let msg = `画像の読み込みが完了しました。\n(縦写真のみ上から順に自動スライスを適用しました)\n現在、合計 ${images.length} 個の素材が保持されています。`;
            if (skippedCount > 0) {
                msg += `\n(重複した画像 ${skippedCount} 枚を自動でスキップしました)`;
            }
            alert(msg);
        }

        function drawFrame() {
            const splitCount = getSelectedSplitCount();
            const paneH = canvas.height / splitCount;
            const paneW = canvas.width;
            const bgColor = bgColorInput.value;

            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            function drawImageWithFullStretch(img, offsetY) {
                const padding = 20; 
                const maxW = paneW - (padding * 2);
                const maxH = paneH - (padding * 2);

                const imgRatio = img.width / img.height;
                const targetRatio = maxW / maxH;
                
                let sWidth, sHeight, sx, sy;

                if (imgRatio > targetRatio) {
                    sHeight = img.height;
                    sWidth = img.height * targetRatio;
                    sx = (img.width - sWidth) / 2;
                    sy = 0;
                } else {
                    sWidth = img.width;
                    sHeight = img.width / targetRatio;
                    sx = 0;
                    sy = (img.height - sHeight) / 2;
                }

                const drawX = padding;
                const drawY = offsetY + padding;

                ctx.drawImage(img, sx, sy, sWidth, sHeight, drawX, drawY, maxW, maxH);
            }

            // ★ グリッドの描画段とスライスパーツの位置を「上から順」に完全同期させるロジック ★
            if (sequenceStep < splitCount) {
                paneIndices[sequenceStep] = currentIndex;
                currentIndex++;
                
                for (let i = 0; i <= sequenceStep; i++) {
                    drawImageWithFullStretch(images[paneIndices[i] % images.length], paneH * i);
                }
            } 
            else {
                // 常に上段(0) → 次の段(1) → の順でローテーションが綺麗に噛み合うように計算
                const loopPos = (sequenceStep - splitCount) % splitCount;
                paneIndices[loopPos] = currentIndex;
                currentIndex++;

                for (let i = 0; i < splitCount; i++) {
                    drawImageWithFullStretch(images[paneIndices[i] % images.length], paneH * i);
                }
            }

            sequenceStep++;
            currentFrameCount++;
        }

        startBtn.addEventListener('click', () => {
            validateInputs();
            updateRequirements();

            currentIndex = 0;
            sequenceStep = 0;
            paneIndices = [0, 0, 0, 0];
            currentFrameCount = 0;
            recordedChunks = [];

            const bpm = parseFloat(bpmInput.value);
            const noteModifier = getSelectedNoteModifier();
            const fps = (bpm / 60) * noteModifier;

            const stream = canvas.captureStream(fps);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
            
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `PhotonBeat_${getSelectedSplitCount()}Split_${bpm}bpm.webm`;
                a.click();
                startBtn.disabled = false;
            };

            mediaRecorder.start();
            startBtn.disabled = true;
            
            const interval = 1000 / fps;
            let lastTime = 0;
            
            function loop(timestamp) {
                if (!lastTime) lastTime = timestamp;
                const elapsed = timestamp - lastTime;

                if (elapsed >= interval) {
                    drawFrame();
                    lastTime = timestamp;
                }

                if (currentFrameCount >= totalFrames) {
                    cancelAnimationFrame(animationId);
                    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                        mediaRecorder.stop();
                    }
                    return;
                }
                
                animationId = requestAnimationFrame(loop);
            }
            
            animationId = requestAnimationFrame(loop);
        });

        updateRequirements();
    </script>
</body>
</html>
